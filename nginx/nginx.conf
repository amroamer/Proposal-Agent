worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   75;
    client_max_body_size 256M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api_zone:10m  rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # Upstreams
    upstream pa_backend  { server backend:8000; }

    # Security headers (global)
    map $sent_http_content_type $ctsp {
        default "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';";
    }

    server {
        listen 80 default_server;
        server_name _;

        # Return relative redirects so the host:port from the original request is preserved
        # (host port differs from nginx's internal listen port, e.g. 8090->80 in dev).
        absolute_redirect off;

        # Redirect root to /ProposalAgent
        location = / {
            return 302 /ProposalAgent/;
        }

        # Redirect /ProposalAgent (no trailing slash) to /ProposalAgent/
        location = /ProposalAgent {
            return 301 /ProposalAgent/;
        }

        # Security headers
        add_header X-Content-Type-Options "nosniff"  always;
        add_header X-Frame-Options        "DENY"     always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy $ctsp     always;

        # -------- API (health) --------
        location = /ProposalAgent/api/health {
            proxy_pass http://pa_backend/ProposalAgent/api/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # -------- API (auth) rate-limited stricter --------
        location ~ ^/ProposalAgent/api/v1/auth/(signin|signup|forgot-password|reset-password) {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://pa_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # -------- API (SSE streaming) — must NOT buffer --------
        location /ProposalAgent/api/v1/reviews/stream {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://pa_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        # -------- API (general) --------
        location /ProposalAgent/api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://pa_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;   # long-running generation calls
        }

        # -------- Frontend (SPA) --------
        location /ProposalAgent/ {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /ProposalAgent/index.html;

            # Long cache for hashed assets (vite emits content-hashed filenames).
            location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            # Never cache the SPA shell — its asset hash references must update
            # on every deploy or the browser keeps loading old JS forever.
            location ~* \.html?$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
            }
        }
    }
}
