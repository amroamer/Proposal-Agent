worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   75;
    server_tokens       off;
    client_max_body_size 200M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;

    limit_req_zone  $binary_remote_addr zone=api_zone:10m  rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    upstream pa_backend { server backend:8000; }

    # ---- HTTP → HTTPS redirect ----
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS ----
    server {
        listen 443 ssl http2;
        server_name _;

        # Replace with real cert path (e.g. Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/proposal-agent.kpmg.local/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/proposal-agent.kpmg.local/privkey.pem;

        ssl_protocols       TLSv1.3 TLSv1.2;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff"  always;
        add_header X-Frame-Options           "DENY"     always;
        add_header Referrer-Policy           "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';" always;

        location = / { return 302 /ProposalAgent/; }

        location = /ProposalAgent/api/health {
            proxy_pass http://pa_backend/ProposalAgent/api/health;
            access_log off;
        }

        location ~ ^/ProposalAgent/api/v1/auth/(signin|signup|forgot-password|reset-password) {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://pa_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ProposalAgent/api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://pa_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        location /ProposalAgent/ {
            alias /usr/share/nginx/html/;
            index index.html;
            try_files $uri $uri/ /ProposalAgent/index.html;

            location ~* \.(?:js|css|woff2?|ttf|eot|png|jpe?g|gif|svg|ico)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
