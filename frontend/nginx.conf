# Proposal Agent - internal nginx config for the production frontend container.
# This nginx runs INSIDE the proposal-frontend container and serves the
# Vite-built static files. The outer kpmg-nginx forwards /ProposalAgent/
# traffic here.
#
# Vite is built with base: "/ProposalAgent/", so the HTML references assets at
# /ProposalAgent/assets/... The `alias` directive below maps that prefix back
# to the real file root so the assets resolve correctly.

server {
    listen 80;
    server_name _;

    # Map /ProposalAgent/<anything> -> /usr/share/nginx/html/<anything>
    location /ProposalAgent/ {
        alias /usr/share/nginx/html/;
        index index.html;

        # SPA fallback: any unmatched client-side route returns the entry HTML
        # so React Router can handle it.
        try_files $uri $uri/ /ProposalAgent/index.html;
    }

    # Hitting root redirects into the app.
    location = / {
        return 301 /ProposalAgent/;
    }
}